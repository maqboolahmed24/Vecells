name: 308_phase4_manage_waitlist_assisted_matrix

on:
  workflow_dispatch:
  pull_request:

jobs:
  manage-waitlist-assisted-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run 308 integration and property suites
        run: >
          pnpm exec vitest run
          /Users/test/Code/V/tests/integration/308_manage_command_truth.spec.ts
          /Users/test/Code/V/tests/integration/308_waitlist_deadline_and_fallback.spec.ts
          /Users/test/Code/V/tests/integration/308_assisted_booking_handoff_and_lease.spec.ts
          /Users/test/Code/V/tests/integration/308_reconciliation_and_dispute_truth.spec.ts
          /Users/test/Code/V/tests/property/308_waitlist_truth_properties.spec.ts
      - name: Run 308 patient manage browser proof
        run: pnpm exec tsx /Users/test/Code/V/tests/playwright/308_patient_manage_truth.spec.ts --run
      - name: Run 308 waitlist browser proof
        run: pnpm exec tsx /Users/test/Code/V/tests/playwright/308_waitlist_offer_and_fallback.spec.ts --run
      - name: Run 308 staff-assisted browser proof
        run: pnpm exec tsx /Users/test/Code/V/tests/playwright/308_staff_assisted_booking_and_recovery.spec.ts --run
      - name: Run 308 reconciliation browser proof
        run: pnpm exec tsx /Users/test/Code/V/tests/playwright/308_reconciliation_status_and_artifact_parity.spec.ts --run
      - name: Validate 308 evidence bundle
        run: pnpm validate:308-phase4-manage-waitlist-assisted-matrix
