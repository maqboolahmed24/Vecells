name: 309_phase4_local_booking_e2e

on:
  workflow_dispatch:
  pull_request:

jobs:
  phase4-local-booking-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run 309 lifecycle integration proof
        run: >
          pnpm exec vitest run
          /Users/test/Code/V/tests/integration/309_end_to_end_lifecycle_and_notification_truth.spec.ts
      - name: Run 309 patient and staff E2E proof
        run: pnpm exec tsx /Users/test/Code/V/tests/playwright/309_patient_staff_local_booking_e2e.spec.ts --run
      - name: Run 309 notification and record-origin re-entry proof
        run: pnpm exec tsx /Users/test/Code/V/tests/playwright/309_notification_and_record_origin_reentry.spec.ts --run
      - name: Run 309 responsive and embedded parity proof
        run: pnpm exec tsx /Users/test/Code/V/tests/playwright/309_mobile_tablet_desktop_embedded_parity.spec.ts --run
      - name: Run 309 artifact and print parity proof
        run: pnpm exec tsx /Users/test/Code/V/tests/playwright/309_artifact_print_and_export_parity.spec.ts --run
      - name: Run 309 accessibility matrix
        run: pnpm exec tsx /Users/test/Code/V/tests/playwright/309_accessibility_matrix.spec.ts --run
      - name: Run 309 visual regression proof
        run: pnpm exec tsx /Users/test/Code/V/tests/playwright/309_visual_regression.spec.ts --run
      - name: Run 309 local booking load probe
        run: pnpm exec tsx /Users/test/Code/V/tests/load/309_phase4_local_booking_load_probe.ts --run
      - name: Validate 309 evidence bundle
        run: pnpm validate:309-phase4-e2e-suite
