name: 307_phase4_booking_core_matrix

on:
  workflow_dispatch:
  pull_request:

jobs:
  booking-core-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run 307 integration and property suites
        run: >
          pnpm exec vitest run
          /Users/test/Code/V/tests/integration/307_capability_matrix.spec.ts
          /Users/test/Code/V/tests/integration/307_slot_snapshot_truth.spec.ts
          /Users/test/Code/V/tests/integration/307_reservation_and_hold_truth.spec.ts
          /Users/test/Code/V/tests/integration/307_commit_replay_and_fencing.spec.ts
          /Users/test/Code/V/tests/integration/307_callback_reorder_and_ambiguous_confirmation.spec.ts
          /Users/test/Code/V/tests/integration/307_compensation_and_recovery.spec.ts
          /Users/test/Code/V/tests/property/307_booking_core_properties.spec.ts
      - name: Run 307 browser truth proof
        run: pnpm exec tsx /Users/test/Code/V/tests/playwright/307_booking_core_browser_truth.spec.ts --run
      - name: Run 307 accessibility proof
        run: pnpm exec tsx /Users/test/Code/V/tests/playwright/307_booking_core_accessibility_and_status.spec.ts --run
      - name: Run 307 contention probe
        run: pnpm exec tsx /Users/test/Code/V/tests/load/307_booking_core_contention_probe.ts --run
      - name: Validate 307 evidence bundle
        run: pnpm validate:307-phase4-booking-core-matrix
