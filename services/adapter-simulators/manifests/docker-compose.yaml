services:
  adapter-simulators:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ../../..:/workspace
    command:
      - sh
      - -lc
      - corepack enable && pnpm install --frozen-lockfile && pnpm exec tsx services/adapter-simulators/src/index.ts
    environment:
      HOST: 0.0.0.0
      PORT: "7104"
      SIMULATOR_SEED_MODE: deterministic
    ports:
      - "7104:7104"
