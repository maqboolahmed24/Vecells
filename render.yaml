services:
  - type: web
    name: vecells-internal-entrypoint
    runtime: node
    plan: free
    region: oregon
    repo: https://github.com/maqboolahmed24/Vecells
    branch: main
    autoDeployTrigger: off
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --dir apps/patient-web build &&
      pnpm --dir apps/clinical-workspace build &&
      pnpm --dir apps/ops-console build &&
      pnpm --dir apps/hub-desk build &&
      pnpm --dir apps/pharmacy-console build &&
      pnpm --dir apps/support-workspace build &&
      pnpm --dir apps/governance-console build &&
      pnpm --dir services/internal-entrypoint build
    startCommand: pnpm --dir services/internal-entrypoint start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VECELLS_ENVIRONMENT
        value: internal
      - key: RELEASE_RING
        value: internal
      - key: HOST
        value: 0.0.0.0
      - key: INTERNAL_ENTRYPOINT_HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: INTERNAL_ENTRYPOINT_PORT
        value: 10000
      - key: INTERNAL_ENTRYPOINT_COOKIE_SECURE
        value: true
      - key: INTERNAL_DATA_MODE
        value: synthetic-disposable
      - key: INTERNAL_TEST_PASSWORD_HASH
        sync: false
      - key: SESSION_SECRET
        generateValue: true
