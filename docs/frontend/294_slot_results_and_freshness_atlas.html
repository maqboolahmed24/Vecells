<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>294 Slot Results And Freshness Atlas</title>
    <style>
      :root {
        color-scheme: light;
        --canvas: #f4f7fb;
        --panel: #ffffff;
        --stroke: #d7e0ea;
        --text: #0f172a;
        --muted: #64748b;
        --primary: #2457ff;
      }
      body {
        margin: 0;
        background: linear-gradient(180deg, #f8fbff 0%, var(--canvas) 100%);
        color: var(--text);
        font: 16px/1.5 Inter, "Segoe UI", sans-serif;
      }
      main {
        width: min(1100px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }
      h1,
      h2,
      p {
        margin: 0;
      }
      .hero,
      .card {
        border: 1px solid var(--stroke);
        border-radius: 20px;
        background: var(--panel);
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.06);
      }
      .hero {
        padding: 24px;
      }
      .hero p {
        margin-top: 8px;
        color: #334155;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
        margin-top: 20px;
      }
      .card {
        padding: 18px;
        display: grid;
        gap: 10px;
      }
      .eyebrow {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(36, 87, 255, 0.08);
        color: var(--primary);
        font-size: 12px;
        font-weight: 700;
      }
      dl {
        display: grid;
        gap: 6px;
        margin: 0;
      }
      dt {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      dd {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main data-testid="PatientBookingSlotResultsAtlas">
      <section class="hero">
        <div class="eyebrow">Snapshot_Result_Studio</div>
        <h1>294 slot results and freshness atlas</h1>
        <p>
          Day-grouped frozen availability, explicit freshness posture, and a consistent help route
          inside the shared booking shell.
        </p>
      </section>
      <section class="grid" id="atlas-grid"></section>
    </main>
    <script>
      window.__patientBookingSlotResultsAtlasData = [
        {
          scenarioId: "booking_case_294_renderable",
          bookingCaseId: "booking_case_294_renderable",
          viewState: "renderable",
          coverageState: "complete",
          headline: "Snapshot complete and ready to browse",
          resultCountLabel: "8 appointments in this snapshot",
          supportAction: "Ask for booking help",
          anchorDayKey: "2026-04-21"
        },
        {
          scenarioId: "booking_case_294_partial",
          bookingCaseId: "booking_case_294_partial",
          viewState: "partial_coverage",
          coverageState: "partial_coverage",
          headline: "Availability is only partially confirmed",
          resultCountLabel: "4 appointments in this snapshot",
          supportAction: "Ask for booking help",
          anchorDayKey: "2026-04-21"
        },
        {
          scenarioId: "booking_case_294_stale",
          bookingCaseId: "booking_case_294_stale",
          viewState: "stale_refresh_required",
          coverageState: "complete",
          headline: "Refresh this snapshot before choosing a slot",
          resultCountLabel: "8 appointments in this snapshot",
          supportAction: "Ask for booking help",
          anchorDayKey: "2026-04-22"
        },
        {
          scenarioId: "booking_case_294_no_supply",
          bookingCaseId: "booking_case_294_no_supply",
          viewState: "no_supply_confirmed",
          coverageState: "complete",
          headline: "No local appointments were found in this completed search",
          resultCountLabel: "0 appointments in this snapshot",
          supportAction: "Ask for booking help",
          anchorDayKey: null
        },
        {
          scenarioId: "booking_case_294_fallback",
          bookingCaseId: "booking_case_294_fallback",
          viewState: "support_fallback",
          coverageState: "failed",
          headline: "Self-service cannot continue from this search snapshot",
          resultCountLabel: "0 appointments in this snapshot",
          supportAction: "Use the supported fallback",
          anchorDayKey: null
        }
      ];

      const grid = document.getElementById("atlas-grid");
      window.__patientBookingSlotResultsAtlasData.forEach((scenario) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="eyebrow">${scenario.scenarioId}</div>
          <h2>${scenario.headline}</h2>
          <div class="meta">
            <span class="chip">${scenario.viewState}</span>
            <span class="chip">${scenario.coverageState}</span>
          </div>
          <dl>
            <div><dt>Route</dt><dd>/bookings/${scenario.bookingCaseId}/select</dd></div>
            <div><dt>Result count</dt><dd>${scenario.resultCountLabel}</dd></div>
            <div><dt>Support action</dt><dd>${scenario.supportAction}</dd></div>
            <div><dt>Anchor day</dt><dd>${scenario.anchorDayKey ?? "none"}</dd></div>
          </dl>
        `;
        grid.appendChild(card);
      });
    </script>
  </body>
</html>
