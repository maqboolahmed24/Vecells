- region "Draft note sections":
  - text: ""
  - heading "Draft note sections" [level=3]
  - text: Live patch lease available for shown slots
  - paragraph: Each section shows the draft wording, the exact target slot, and the current patch lease before insert is available.
  - term: Artifact
  - definition: /draft_note_artifact\.\d+\.task-\d+\.clinician_note\.v1/
  - term: Session
  - definition: /assistive_session\.\d+\.task-\d+\.task-summary-task-\d+/
  - list "Draft note sections":
    - listitem "History summary":
      - text: ""
      - heading "History summary" [level=4]
      - text: Ready for human review
      - paragraph: Evidence mapped to current task snapshot
      - group "Compare view for History summary":
        - button "Before"
        - button "After" [pressed]
        - button "Compare"
      - region "History summary wording":
        - heading "History summary wording" [level=5]
        - text: ""
        - list "after draft lines":
          - listitem: Keep Patient reports cough and wheeze after a viral illness. Keeps the current history wording.
          - listitem: Add No same-day red flags are recorded in the request. Adds safety context from the reviewed evidence.
          - listitem: Clarify Parent asks whether antibiotics are needed. Avoids implying a request that was not stated.
      - text: Decision note - history slot note section - live
      - term: Lease
      - definition: live
      - term: Session
      - definition: live
      - term: Fence
      - definition: Live for this review snapshot
      - button "Review target"
      - button "Keep draft visible"
      - paragraph: Bound to Decision note - history slot.
      - button "Insert in shown slot"
      - paragraph: Insert creates draft text only; final note wording remains a human action.
    - listitem "Safety-net plan":
      - text: ""
      - heading "Safety-net plan" [level=4]
      - text: Ready for human review
      - paragraph: Uses current decision epoch and policy bundle
      - group "Compare view for Safety-net plan":
        - button "Before"
        - button "After" [pressed]
        - button "Compare"
      - region "Safety-net plan wording":
        - heading "Safety-net plan wording" [level=5]
        - text: ""
        - list "after draft lines":
          - listitem: Keep Review if breathing worsens or fever persists. Keeps the current safety-net instruction.
          - listitem: Add Advise reliever inhaler use as already prescribed. Adds a bounded plan item supported by the medication record.
      - text: Decision note - plan slot note section - live
      - term: Lease
      - definition: live
      - term: Session
      - definition: live
      - term: Fence
      - definition: Live for this review snapshot
      - button "Review target"
      - button "Keep draft visible"
      - paragraph: Bound to Decision note - plan slot.
      - button "Insert in shown slot"
      - paragraph: The patch lease is scoped to the displayed plan slot only.