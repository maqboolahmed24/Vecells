- region "Rejected to alternative":
  - text: ""
  - heading "Rejected to alternative" [level=3]
  - text: "Edited by clinician: Dr A. Rahman"
  - region "Final human note":
    - text: Final human artifact
    - heading "Final human note" [level=4]
    - paragraph: Alternative note retained by the clinician. No assistive wording is promoted into the final artifact.
    - term: Authored by
    - definition: "Edited by clinician: Dr A. Rahman"
    - term: Settled
    - definition: /Today \d+:\d+/
  - text: Material change 3 material changes from the assistive source.
  - list "Compact edit delta":
    - listitem: Safety-net wording changed
    - listitem: Red-flag qualifier added
    - listitem: Request phrasing changed
    - listitem: Existing plan unchanged
  - button "Review change detail"
  - region "Before and after at capture":
    - heading "Before and after at capture" [level=4]
    - article:
      - heading "Safety-net wording" [level=5]
      - term: Assistive source
      - definition: Review if breathing worsens or fever persists.
      - term: Final human artifact
      - definition: Seek urgent review if breathing worsens, blue lips appear, or fever persists.
    - article:
      - heading "Red-flag qualifier" [level=5]
      - term: Assistive source
      - definition: No source text
      - term: Final human artifact
      - definition: No same-day red flags are recorded in the current request.
    - article:
      - heading "Request phrasing" [level=5]
      - term: Assistive source
      - definition: Parent asks for antibiotics.
      - term: Final human artifact
      - definition: Parent asks whether antibiotics are needed.
    - article:
      - heading "Existing plan" [level=5]
      - term: Assistive source
      - definition: Use the reliever inhaler already prescribed.
      - term: Final human artifact
      - definition: Use the reliever inhaler already prescribed.
  - note "Override approval burden":
    - strong: Reason required before trail completion
    - text: Rejected assistive content must carry a coded reason and preserve the alternative human artifact.
  - region "Capture required reason":
    - text: ""
    - heading "Capture required reason" [level=4]
    - button "Hide reason sheet" [expanded]
    - paragraph: A coded reason is required. Optional note text stays disclosure-fenced.
    - group "Override reason codes":
      - text: ""
      - checkbox "Clinical safety Final wording was changed to reduce clinical risk or ambiguity."
      - text: Clinical safety Final wording was changed to reduce clinical risk or ambiguity.
      - checkbox "Evidence mismatch Assistive text did not match the bounded evidence snapshot."
      - text: Evidence mismatch Assistive text did not match the bounded evidence snapshot.
      - checkbox "Patient context Human context changed the final artifact beyond the assistive source."
      - text: Patient context Human context changed the final artifact beyond the assistive source.
      - checkbox "Policy exception Policy posture requires an explicit override reason."
      - text: Policy exception Policy posture requires an explicit override reason.
      - checkbox "Low confidence acceptance The artifact was used despite low or suppressed support."
      - text: Low confidence acceptance The artifact was used despite low or suppressed support.
      - checkbox "Trust recovery Continuity, freshness, or trust recovery shaped the final action."
      - text: Trust recovery Continuity, freshness, or trust recovery shaped the final action.
      - checkbox "Alternative more appropriate The clinician chose a safer or more suitable alternative." [checked]
      - text: Alternative more appropriate The clinician chose a safer or more suitable alternative.
      - checkbox "Style only Only tone, grammar, or local formatting changed."
      - text: Style only Only tone, grammar, or local formatting changed.
    - group: Optional note
    - button "Complete reason capture"
  - region "Action trail":
    - heading "Action trail" [level=4]
    - list:
      - listitem:
        - text: /Assistive source captured Documentation composer - \d+:\d+/
        - emphasis: Source artifact only
      - listitem:
        - text: "/rejected to alternative Edited by clinician: Dr A\\. Rahman - Today \\d+:\\d+/"
        - emphasis: Human action recorded
      - listitem:
        - text: "/Final human artifact linked Edited by clinician: Dr A\\. Rahman - Today \\d+:\\d+/"
        - emphasis: Settlement posture visible
  - term: Action record
  - definition: /assistive_action_record\.\d+\.task-\d+\.reject_to_alternative/
  - term: Override record
  - definition: /override_record\.\d+\.task-\d+\.alternative/
  - term: Confidence digest
  - definition: /assistive_confidence_digest\.\d+\.task-\d+\.task-summary-task-\d+/
  - term: Provenance envelope
  - definition: /assistive_provenance\.\d+\.task-\d+\.task-summary-task-\d+/