- tabpanel "Kill switch":
  - heading "Kill switch while output is open" [level=2]
  - paragraph: /PH8-\d+-GLOBAL-KILL-\d+/
  - text: Global model/vendor Frozen No refresh required
  - article:
    - heading "Operational notice" [level=3]
    - paragraph: Assistive output is retained as read-only provenance. Invocation, insertion, regenerate, export, and commit controls are disabled.
  - article:
    - heading "Safe recovery" [level=3]
    - paragraph: Release recovery can inspect the switch state. The open output cannot be inserted or accepted.
    - button "Open release recovery"
    - button "Insert draft disabled" [disabled]
  - text: "Audit: assistive.kill_switch.enforced Evidence: kill switch recorded"