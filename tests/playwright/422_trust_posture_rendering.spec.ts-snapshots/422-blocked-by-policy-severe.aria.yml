- alert "Policy hard stop":
  - text: Assistive trust posture
  - heading "Policy hard stop" [level=3]
  - text: Blocked by policy
  - paragraph:
    - strong: Policy ceiling blocks this surface
    - text: The current policy bundle does not permit assistive rendering or local recovery from this workspace.
  - heading "Hard stop" [level=4]
  - paragraph: The current policy bundle does not permit assistive rendering or local recovery from this workspace.
  - term: Current actionability
  - definition: blocked by policy
  - term: Confidence posture
  - definition: hidden
  - heading "Allowed now" [level=4]
  - list "Allowed assistive actions":
    - listitem: Manual review only
  - heading "Suppressed" [level=4]
  - list "Suppressed assistive actions":
    - listitem: Show assistive text
    - listitem: Insert draft
    - listitem: Accept artifact
    - listitem: Regenerate
    - listitem: Export artifact
  - text: Dominant safe next action
  - strong: Use manual workflow
  - paragraph: Do not work around this block. Continue through the primary clinical workflow.
  - paragraph: No local assistive action is available.
  - term: Trust envelope
  - definition: /assistive_capability_trust_envelope\.\d+\.task-\d+\.task-summary-task-\d+/
  - term: Rollout verdict
  - definition: /assistive_rollout_verdict\.\d+\.task-\d+\.documentation_composer/
  - term: Recovery disposition
  - definition: /release_recovery_disposition\.\d+\.task-\d+\.assistive/