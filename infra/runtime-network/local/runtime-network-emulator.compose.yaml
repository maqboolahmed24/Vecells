
services:
  public-edge:
    image: busybox:1.36
    command: ["sh", "-c", "sleep infinity"]
    ports: ["8080:8080"]
    networks: ["public_edge"]
  shell-delivery:
    image: busybox:1.36
    command: ["sh", "-c", "sleep infinity"]
    ports: ["8081:8081"]
    networks: ["shell_delivery"]
  published-gateway:
    image: busybox:1.36
    command: ["sh", "-c", "sleep infinity"]
    ports: ["8082:8082"]
    networks: ["published_gateway", "application_core", "assurance_security"]
  command-api:
    image: busybox:1.36
    command: ["sh", "-c", "sleep infinity"]
    networks: ["application_core", "stateful_data", "integration_perimeter", "assurance_security"]
  projection-worker:
    image: busybox:1.36
    command: ["sh", "-c", "sleep infinity"]
    networks: ["application_core", "stateful_data", "assurance_security"]
  integration-dispatch:
    image: busybox:1.36
    command: ["sh", "-c", "sleep infinity"]
    networks: ["integration_perimeter", "stateful_data", "assurance_security"]
  adapter-simulators:
    image: busybox:1.36
    command: ["sh", "-c", "sleep infinity"]
    networks: ["integration_perimeter"]
  data-plane:
    image: busybox:1.36
    command: ["sh", "-c", "sleep infinity"]
    networks: ["stateful_data"]
  assurance-control:
    image: busybox:1.36
    command: ["sh", "-c", "sleep infinity"]
    networks: ["assurance_security", "stateful_data"]

networks:
  public_edge: {}
  shell_delivery:
    internal: true
  published_gateway:
    internal: true
  application_core:
    internal: true
  integration_perimeter:
    internal: true
  stateful_data:
    internal: true
  assurance_security:
    internal: true
