services:
  artifact-store:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: vecells-object-storage-local
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vecells
      MINIO_ROOT_PASSWORD: vecellsminio
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - stateful_data
    volumes:
      - artifact_store:/data

volumes:
  artifact_store: {}

networks:
  stateful_data:
    internal: true
