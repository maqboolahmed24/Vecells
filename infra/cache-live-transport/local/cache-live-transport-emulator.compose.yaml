services:
  cache-plane:
    image: valkey/valkey:8-alpine
    ports:
      - "16379:6379"
  live-transport-bus:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "14222:4222"
  connection-registry:
    image: ghcr.io/opencontainers/busybox:latest
    command: ["sh", "-c", "while true; do sleep 3600; done"]
