  "laws": [
    {
      "lawId": "task_children_are_same_shell",
      "statement": "/workspace/task/:taskId/more-info and /workspace/task/:taskId/decision are same-shell child states, not separate mini-apps."
    },
    {
      "lawId": "queue_to_task_restores_through_launch_context",
      "statement": "Queue preview, task open, browser-back restore, and next-task movement must rehydrate through TaskLaunchContext and WorkspaceNavigationLedger, not ambient browser history."
    },
    {
      "lawId": "approvals_and_escalations_stay_in_family",
      "statement": "Approvals, escalations, changed, and search remain inside the same shell continuity key whenever the active workspace family is still valid."
    },
    {
      "lawId": "selected_anchor_is_explicit",
      "statement": "Every route family row publishes a selected-anchor policy so anchor restoration and invalidation are machine-readable."
    }
